{% extends "base.html" %}

{% block title %}db-blog{% endblock %}

{% block content %}
<style>
    /* ---------- page + theme styles ---------- */
    body {
        background-color: #FFF7F6;
        color: black;
        transition: background-color 0.3s ease, color 0.3s ease;
        margin: 0;
    }
    .dark-theme {
        background-color: black;
        color: #FFF7F6;
    }

    /* ---------- theme-toggle button ---------- */
    .theme-toggle-button {
        border-radius: 50%;
        width: 40px;
        height: 40px;
        color: #A6FFA3;
        background-color: #9179eb;
        border: none;
        outline: none !important;
    }
    .theme-toggle-button:hover {
        background-color: #6c38fa;
        cursor: pointer;
        border: none;
        outline: none !important;
    }

    /* ---------- back button ---------- */
    .back-blog-button {
        padding: 8px 12px;
        background-color: #9179eb;
        color: #A6FFA3;
        border: none;
        border-radius: 4px;
        outline: none !important;
        text-decoration: none;
        font-size: 0.9rem;
    }
    .back-blog-button:hover {
        background-color: #6c38fa;
        cursor: pointer;
        color: #A6FFA3;
        text-decoration: none;
    }

    /* ---------- layout ---------- */
    .blog-layout {
        display: flex;
        gap: 2rem;
        align-items: flex-start;
        max-width: 11.5in;
        margin: 1.25rem auto 3rem;
        padding: 0 1.5rem;
        box-sizing: border-box;
    }
    .blog-sidebar {
        flex: 0 0 240px;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        align-self: flex-start;
        position: sticky;
        top: 80px;
    }
    .blog-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1rem;
        background: rgba(145, 121, 235, 0.08);
        border: 1px solid rgba(145, 121, 235, 0.2);
        border-radius: 8px;
    }
    .blog-actions .back-blog-button {
        flex: 1 1 auto;
        width: auto;
        text-align: center;
    }
    .blog-actions .theme-toggle-button {
        width: 40px;
    }
    .blog-toc {
        padding: 1rem;
        background: rgba(145, 121, 235, 0.08);
        border: 1px solid rgba(145, 121, 235, 0.2);
        border-radius: 8px;
    }
    .blog-toc h2 {
        font-size: 1rem;
        margin-bottom: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }
    .blog-toc ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    .blog-toc li {
        margin-bottom: 0.35rem;
        line-height: 1.3;
    }
    .blog-toc a {
        color: inherit;
        text-decoration: none;
    }
    .blog-toc a:hover,
    .blog-toc a:focus {
        text-decoration: underline;
    }
    .blog-toc .toc-level-h2 {
        padding-left: 0.75rem;
    }
    .blog-toc .toc-level-h3 {
        padding-left: 1.5rem;
        font-size: 0.92rem;
    }

    #blog-content {
        max-width: 8.27in;
        width: 100%;
        margin: 0 auto;
        line-height: 1.6;
        box-sizing: border-box;
    }
    #blog-content h1:first-child,
    #blog-content h2:first-child {
        margin-top: 0.25rem;
    }
    #blog-content ul,
    #blog-content ol {
        padding-left: 1.2rem;
    }
    #blog-content li + li {
        margin-top: 0.3rem;
    }
    #blog-content img {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
        margin: 1rem 0;
    }

    @media (max-width: 992px) {
        .blog-layout {
            flex-direction: column;
            gap: 1.5rem;
            padding: 0 1rem;
        }
        .blog-sidebar {
            position: static;
            width: 100%;
        }
        .blog-actions {
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 0.5rem;
        }
        .blog-toc {
            width: 100%;
        }
        #blog-content {
            margin: 0;
        }
    }

    /* ---------- scroll-progress bar ---------- */
    #scroll-progress-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: rgba(0, 0, 0, 0.05);
        z-index: 9999;
    }
    #scroll-progress-bar {
        height: 100%;
        width: 0%;
        background: #9179eb;
        transition: width 0.15s ease-out;
    }
    body.dark-theme #scroll-progress-container {
        background: rgba(255, 255, 255, 0.15);
    }
    body.dark-theme #scroll-progress-bar {
        background: #A6FFA3;
    }
</style>

<!-- scrolling progress bar -->
<div id="scroll-progress-container">
    <div id="scroll-progress-bar"></div>
</div>

<!-- main blog content -->
<div class="blog-layout" id="blog-layout">
    <aside class="blog-sidebar">
        <div class="blog-actions">
            <a href="/blog/" class="back-blog-button">&larr; All Posts</a>
            <button class="btn btn-secondary theme-toggle-button" id="theme-toggle" aria-label="Switch to Dark Mode">
                &#9790;
            </button>
        </div>
        <nav class="blog-toc" id="blog-toc" aria-label="Table of contents">
            <h2>Contents</h2>
            <ul class="toc-list"></ul>
        </nav>
    </aside>
    <div class="container mt-2 blog-main" id="blog-content">
        {{ blog_html|safe }}
    </div>
</div>

<script>
    /* ---------- theme toggle ---------- */
    document.getElementById('theme-toggle').addEventListener('click', function () {
        document.body.classList.toggle('dark-theme');
        const button = this;
        if (document.body.classList.contains('dark-theme')) {
            button.innerHTML = '&#9728;&#65038;';
            button.setAttribute('aria-label', 'Switch to Light Mode');
        } else {
            button.innerHTML = '&#9790;';
            button.setAttribute('aria-label', 'Switch to Dark Mode');
        }
    });

    /* ---------- scroll-progress bar ---------- */
    const progressBar = document.getElementById('scroll-progress-bar');
    window.addEventListener('scroll', () => {
        const doc = document.documentElement;
        const scrollTop = doc.scrollTop || document.body.scrollTop;
        const scrollHeight = doc.scrollHeight - doc.clientHeight;
        const progress = scrollHeight ? (scrollTop / scrollHeight) * 100 : 0;
        progressBar.style.width = progress + '%';
    });

    /* ---------- build table of contents ---------- */
    const blogContent = document.getElementById('blog-content');
    const tocNav = document.getElementById('blog-toc');
    const tocList = tocNav ? tocNav.querySelector('.toc-list') : null;
    if (blogContent && tocList) {
        const headings = blogContent.querySelectorAll('h1, h2, h3');
        const slugCounts = {};
        headings.forEach((heading, index) => {
            const text = heading.textContent.trim();
            if (!text) return;
            const level = heading.tagName.toLowerCase();
            let slug = text
                .toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-');
            if (!slug) slug = 'section-' + (index + 1);
            if (slugCounts[slug]) {
                slugCounts[slug] += 1;
                slug = slug + '-' + slugCounts[slug];
            } else {
                slugCounts[slug] = 1;
            }
            heading.id = slug;
            const item = document.createElement('li');
            item.classList.add('toc-level-' + level);
            const link = document.createElement('a');
            link.href = '#' + slug;
            link.textContent = text;
            item.appendChild(link);
            tocList.appendChild(item);
        });
        if (!tocList.children.length) {
            tocNav.style.display = 'none';
        } else {
            tocNav.addEventListener('click', (event) => {
                if (event.target instanceof HTMLAnchorElement) {
                    event.preventDefault();
                    const targetId = event.target.getAttribute('href').slice(1);
                    const target = document.getElementById(targetId);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        }
    }
</script>
{% endblock %}
