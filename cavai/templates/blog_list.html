{% extends "base.html" %}

{% block title %}db-blog{% endblock %}

{% block content %}
<style>
    body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(90deg, #9179eb 0%, #6c38fa 100%);
        font-family: 'Signika', sans-serif;
        color: #FFF;
    }

    body::before {
        content: "";
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noisy' x='0' y='0' width='100%25' height='100%25'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.50' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noisy)' opacity='0.15'/%3E%3C/svg%3E");
        opacity: 0.3;
        z-index: 1;
    }

    .blog-list-container {
        position: relative;
        z-index: 2;
        max-width: 720px;
        margin: 3rem auto;
        padding: 0 1.5rem;
    }

    .blog-list-container h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .blog-list-container .subtitle {
        opacity: 0.75;
        margin-bottom: 2rem;
        font-size: 1rem;
    }

    .blog-card {
        display: block;
        background: #fff;
        color: #333;
        border-radius: 8px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1rem;
        text-decoration: none;
        box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .blog-card:hover {
        transform: translateY(-2px);
        box-shadow: 4px 4px 16px rgba(0,0,0,0.25);
        text-decoration: none;
        color: #333;
    }
    .blog-card h2 {
        margin: 0;
        font-size: 1.25rem;
        color: #6c38fa;
    }

    .back-link {
        display: inline-block;
        margin-bottom: 1.5rem;
        color: #A6FFA3;
        text-decoration: none;
        font-size: 0.95rem;
    }
    .back-link:hover {
        text-decoration: underline;
        color: #A6FFA3;
    }
</style>

<link href="https://fonts.googleapis.com/css2?family=Signika:wght@400;600&display=swap" rel="stylesheet">

<div class="blog-list-container">
    <a href="/" class="back-link">&larr; back to chat</a>
    <h1>Blog</h1>
    <p class="subtitle">Thoughts, experiments, and project write-ups.</p>

    {% for post in posts %}
    <a href="/blog/{{ post.slug }}/" class="blog-card">
        <h2>{{ post.title }}</h2>
    </a>
    {% empty %}
    <p>No posts yet.</p>
    {% endfor %}
</div>
{% endblock %}
